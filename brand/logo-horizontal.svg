<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" role="img" aria-label="Arthur Herron Butchers — horizontal logo">
  <title>Arthur Herron — Horizontal Header Logo</title>

  <!-- ═══════════════════════════════════════
       ICON MARK (left, scaled down)
  ════════════════════════════════════════ -->
  <g transform="translate(8, 5) scale(0.72)">

    <!-- Cleaver, rotated -22° -->
    <g transform="rotate(-22, 100, 90)">
      <path d="M 16 28 L 178 18 L 190 22 L 190 100 L 16 108 Q 4 104 4 96 L 4 40 Q 4 30 16 28 Z" fill="#1B2E6B"/>
      <path d="M 16 102 L 190 98 L 190 106 Q 190 114 178 114 L 16 114 Q 4 114 4 104 Z" fill="#152259"/>
      <rect x="4" y="18" width="186" height="10" rx="3" fill="#253680"/>
      <circle cx="166" cy="58" r="12" fill="white"/>
      <rect x="183" y="16" width="16" height="94" rx="2" fill="#111c4a"/>
      <rect x="198" y="20" width="64" height="82" rx="9" fill="#1B2E6B"/>
      <circle cx="214" cy="61" r="5.5" fill="white" opacity="0.5"/>
      <circle cx="230" cy="61" r="5.5" fill="white" opacity="0.5"/>
      <circle cx="246" cy="61" r="5.5" fill="white" opacity="0.5"/>
      <rect x="198" y="20" width="64" height="9" rx="9" fill="#253680"/>
    </g>

    <!-- Steak cut -->
    <path d="
      M 100 52
      C 128 46, 150 58, 153 78
      C 156 98, 143 124, 122 134
      C 110 140, 94 140, 82 133
      C 65 123, 54 106, 56 88
      C 58 66, 76 58, 100 52 Z
    " fill="white"/>
    <path d="
      M 100 60
      C 126 54, 144 66, 146 84
      C 148 102, 136 124, 116 132
      C 106 137, 93 136, 82 128
      C 68 118, 62 102, 64 86
      C 67 66, 80 66, 100 60 Z
    " fill="#C41E3A"/>
    <path d="
      M 86 70 L 116 70 Q 121 70 121 75 L 121 88 L 130 88 Q 135 88 135 93 Q 135 98 130 98 L 72 98 Q 67 98 67 93 Q 67 88 72 88 L 80 88 L 80 75 Q 80 70 86 70 Z
    " fill="white" opacity="0.8"/>
    <path d="M 96 105 Q 108 100, 120 107" stroke="white" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>

  </g>

  <!-- ═══════════════════════════════════════
       WORDMARK (right of icon)
  ════════════════════════════════════════ -->

  <!-- "ARTHUR" — mixed cap sizing -->
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#1B2E6B" letter-spacing="3">
    <tspan x="188" y="82" font-size="58">A</tspan>
    <tspan font-size="38" dy="9">RTHU</tspan>
    <tspan font-size="58" dy="-9">R</tspan>
  </text>

  <!-- Small fleur-de-lis accents -->
  <g transform="translate(223, 56)" fill="#C41E3A" transform-origin="0 0">
    <path d="M 0 0 C -2 -4, -4 -6, -3 -10 C -1.5 -14, 1.5 -14, 3 -10 C 4 -6, 2 -4, 0 0 Z"/>
    <path d="M 0 0 C -4 -1.5, -7 0, -6 3 C -5 5, -3 4, 0 0 Z"/>
    <path d="M 0 0 C 4 -1.5, 7 0, 6 3 C 5 5, 3 4, 0 0 Z"/>
    <rect x="-1" y="0" width="2" height="4" rx="0.5"/>
    <path d="M -3 4 L 3 4 L 2 6 L -2 6 Z"/>
  </g>
  <g transform="translate(437, 56)" fill="#C41E3A">
    <path d="M 0 0 C -2 -4, -4 -6, -3 -10 C -1.5 -14, 1.5 -14, 3 -10 C 4 -6, 2 -4, 0 0 Z"/>
    <path d="M 0 0 C -4 -1.5, -7 0, -6 3 C -5 5, -3 4, 0 0 Z"/>
    <path d="M 0 0 C 4 -1.5, 7 0, 6 3 C 5 5, 3 4, 0 0 Z"/>
    <rect x="-1" y="0" width="2" height="4" rx="0.5"/>
    <path d="M -3 4 L 3 4 L 2 6 L -2 6 Z"/>
  </g>

  <!-- Double rule dividers -->
  <rect x="188" y="92" width="356" height="2" fill="#C41E3A"/>
  <rect x="188" y="97" width="356" height="1" fill="#1B2E6B" opacity="0.4"/>

  <!-- "HERRON" -->
  <text x="188" y="148" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="68" fill="#1B2E6B" letter-spacing="6">HERRON</text>

  <!-- Small leaf in O of HERRON -->
  <g transform="translate(397, 135)" fill="#C41E3A">
    <path d="M 0 0 C 3 -5, 8 -4, 6 0 C 4 4, -3 4, 0 0 Z"/>
  </g>

</svg>
