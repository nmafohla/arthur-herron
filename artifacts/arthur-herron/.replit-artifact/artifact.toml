kind = "web"
previewPath = "/"
title = "Arthur Herron Butchery"
version = "1.0.0"
id = "artifacts/arthur-herron"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23667

[services.development]
run = "pnpm --filter @workspace/arthur-herron run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arthur-herron", "run", "build" ]
publicDir = "artifacts/arthur-herron/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23667"
BASE_PATH = "/"
