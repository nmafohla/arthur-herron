<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Arthur Herron favicon">
  <title>Arthur Herron Favicon</title>
  <!-- Circular background -->
  <circle cx="32" cy="32" r="32" fill="#1B2E6B"/>

  <!-- Simplified cleaver (white, diagonal) -->
  <g transform="rotate(-22, 32, 30)">
    <!-- Blade body -->
    <rect x="4" y="12" width="44" height="26" rx="3" fill="white"/>
    <!-- Cutting edge shade -->
    <rect x="4" y="35" width="44" height="4" rx="2" fill="#e0e0e0"/>
    <!-- Spine -->
    <rect x="4" y="12" width="44" height="5" rx="3" fill="#f5f5f5"/>
    <!-- Blade hole -->
    <circle cx="42" cy="25" r="4" fill="#1B2E6B"/>
    <!-- Handle -->
    <rect x="47" y="14" width="16" height="22" rx="4" fill="white"/>
    <!-- Rivets (simplified single dot) -->
    <circle cx="55" cy="25" r="2" fill="#1B2E6B" opacity="0.5"/>
  </g>

  <!-- Steak shape (simplified for small size) -->
  <!-- Fat cap -->
  <ellipse cx="30" cy="34" rx="13" ry="10" fill="white"/>
  <!-- Meat -->
  <ellipse cx="30" cy="34" rx="10" ry="8" fill="#C41E3A"/>
  <!-- Simplified bone bar -->
  <rect x="22" y="31" width="16" height="3" rx="1.5" fill="white" opacity="0.85"/>
  <rect x="28" y="27" width="3" height="8" rx="1.5" fill="white" opacity="0.85"/>
</svg>
