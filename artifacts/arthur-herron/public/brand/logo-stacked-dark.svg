<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" role="img" aria-label="Arthur Herron Butchers — stacked logo dark variant">
  <title>Arthur Herron — Full Stacked Logo (Dark Background)</title>

  <!-- ICON MARK -->
  <g transform="translate(140, 10)">
    <!-- Cleaver (white on dark) -->
    <g transform="rotate(-22, 100, 90)">
      <path d="M 16 28 L 178 18 L 190 22 L 190 100 L 16 108 Q 4 104 4 96 L 4 40 Q 4 30 16 28 Z" fill="white"/>
      <path d="M 16 102 L 190 98 L 190 106 Q 190 114 178 114 L 16 114 Q 4 114 4 104 Z" fill="#e0e0e0"/>
      <rect x="4" y="18" width="186" height="10" rx="3" fill="#f5f5f5"/>
      <circle cx="166" cy="58" r="12" fill="#111827"/>
      <rect x="183" y="16" width="16" height="94" rx="2" fill="#d0d0d0"/>
      <rect x="198" y="20" width="64" height="82" rx="9" fill="white"/>
      <circle cx="214" cy="61" r="5.5" fill="#111827" opacity="0.3"/>
      <circle cx="230" cy="61" r="5.5" fill="#111827" opacity="0.3"/>
      <circle cx="246" cy="61" r="5.5" fill="#111827" opacity="0.3"/>
      <rect x="198" y="20" width="64" height="9" rx="9" fill="#f5f5f5"/>
    </g>

    <!-- Steak cut -->
    <path d="
      M 100 52 C 128 46, 150 58, 153 78
      C 156 98, 143 124, 122 134
      C 110 140, 94 140, 82 133
      C 65 123, 54 106, 56 88
      C 58 66, 76 58, 100 52 Z
    " fill="white" opacity="0.9"/>
    <path d="
      M 100 60 C 126 54, 144 66, 146 84
      C 148 102, 136 124, 116 132
      C 106 137, 93 136, 82 128
      C 68 118, 62 102, 64 86
      C 67 66, 80 66, 100 60 Z
    " fill="#C41E3A"/>
    <path d="
      M 86 70 L 116 70 Q 121 70 121 75 L 121 88 L 130 88 Q 135 88 135 93 Q 135 98 130 98 L 72 98 Q 67 98 67 93 Q 67 88 72 88 L 80 88 L 80 75 Q 80 70 86 70 Z
    " fill="white" opacity="0.8"/>
    <path d="M 96 105 Q 108 100, 120 107" stroke="white" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- WORDMARK (white text) -->
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="white" letter-spacing="4">
    <tspan x="48" y="256" font-size="88">A</tspan>
    <tspan font-size="58" dy="14">RTHU</tspan>
    <tspan font-size="88" dy="-14">R</tspan>
  </text>

  <!-- Fleur-de-lis (red) -->
  <g transform="translate(117, 218)" fill="#C41E3A">
    <path d="M 0 0 C -3 -5, -6 -8, -4 -14 C -2 -20, 2 -20, 4 -14 C 6 -8, 3 -5, 0 0 Z"/>
    <path d="M 0 0 C -6 -2, -10 0, -9 4 C -8 7, -4 6, 0 0 Z"/>
    <path d="M 0 0 C 6 -2, 10 0, 9 4 C 8 7, 4 6, 0 0 Z"/>
    <rect x="-1.5" y="0" width="3" height="5" rx="1"/>
    <path d="M -4 5 L 4 5 L 3 7 L -3 7 Z"/>
  </g>
  <g transform="translate(356, 218)" fill="#C41E3A">
    <path d="M 0 0 C -3 -5, -6 -8, -4 -14 C -2 -20, 2 -20, 4 -14 C 6 -8, 3 -5, 0 0 Z"/>
    <path d="M 0 0 C -6 -2, -10 0, -9 4 C -8 7, -4 6, 0 0 Z"/>
    <path d="M 0 0 C 6 -2, 10 0, 9 4 C 8 7, 4 6, 0 0 Z"/>
    <rect x="-1.5" y="0" width="3" height="5" rx="1"/>
    <path d="M -4 5 L 4 5 L 3 7 L -3 7 Z"/>
  </g>

  <!-- Double rule -->
  <rect x="44" y="268" width="392" height="2.5" fill="#C41E3A"/>
  <rect x="44" y="274" width="392" height="1" fill="white" opacity="0.35"/>

  <!-- HERRON -->
  <text x="44" y="356" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="108" fill="white" letter-spacing="6">HERRON</text>

  <!-- Leaf in O -->
  <g transform="translate(330, 340)" fill="#C41E3A">
    <path d="M 0 0 C 4 -6, 10 -6, 8 0 C 6 6, -4 6, 0 0 Z"/>
  </g>
</svg>
